name: Daily YouTube Upload

on:
  schedule:
    - cron: '0 8 * * *'  # 毎日 08:00 UTC = 17:00 JST
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome and Japanese fonts
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q google-chrome-stable fonts-noto-cjk

      - name: Write credentials
        run: |
          echo "YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}" >> .env
          echo '${{ secrets.YOUTUBE_TOKEN }}' > .youtube-token.json

      - name: Generate content (type + AI quote)
        run: node scripts/generate-content.js $(date +%Y-%m-%d)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate audio
        run: node scripts/generate-audio.js $(date +%Y-%m-%d)

      - name: Render video
        run: |
          COMP_ID=$(node -e "console.log(require('./content.json').compositionId)")
          PROPS=$(node -e "process.stdout.write(JSON.stringify(require('./content.json').props))")
          npx remotion render src/index.ts "$COMP_ID" out/video.mp4 \
            --browser-executable=$(which google-chrome-stable) \
            --props "$PROPS"

      - name: Upload to YouTube
        run: node scripts/upload-youtube.js
