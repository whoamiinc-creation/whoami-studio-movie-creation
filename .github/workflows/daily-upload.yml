name: Daily Upload (YouTube + TikTok + Instagram)

on:
  schedule:
    - cron: '0 8 * * *'  # 毎日 08:00 UTC = 17:00 JST
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome and Japanese fonts
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q google-chrome-stable fonts-noto-cjk

      - name: Write credentials
        run: |
          echo "YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}" >> .env
          echo "TIKTOK_CLIENT_KEY=${{ secrets.TIKTOK_CLIENT_KEY }}" >> .env
          echo "TIKTOK_CLIENT_SECRET=${{ secrets.TIKTOK_CLIENT_SECRET }}" >> .env
          echo '${{ secrets.YOUTUBE_TOKEN }}' > .youtube-token.json
          if [ -n '${{ secrets.TIKTOK_TOKEN }}' ]; then
            echo '${{ secrets.TIKTOK_TOKEN }}' > .tiktok-token.json
          fi

      - name: Generate content (type + AI quote)
        run: node scripts/generate-content.js $(date +%Y-%m-%d)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate audio
        run: node scripts/generate-audio.js $(date +%Y-%m-%d)

      - name: Render video
        run: |
          COMP_ID=$(node -e "console.log(require('./content.json').compositionId)")
          PROPS=$(node -e "process.stdout.write(JSON.stringify(require('./content.json').props))")
          npx remotion render src/index.ts "$COMP_ID" out/video.mp4 \
            --browser-executable=$(which google-chrome-stable) \
            --props "$PROPS"

      - name: Upload to YouTube
        run: node scripts/upload-youtube.js

      - name: Upload to TikTok
        continue-on-error: true
        if: ${{ secrets.TIKTOK_TOKEN != '' }}
        run: node scripts/upload-tiktok.js

      - name: Upload to Instagram
        continue-on-error: true
        if: ${{ secrets.INSTAGRAM_ACCESS_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: node scripts/upload-instagram.js

      - name: Save refreshed tokens to GitHub Secrets
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f .youtube-token.json ]; then
            gh secret set YOUTUBE_TOKEN \
              --repo whoamiinc-creation/whoami-studio-movie-creation \
              --body "$(cat .youtube-token.json)"
            echo "YOUTUBE_TOKEN updated."
          fi
          if [ -f .tiktok-token.json ]; then
            gh secret set TIKTOK_TOKEN \
              --repo whoamiinc-creation/whoami-studio-movie-creation \
              --body "$(cat .tiktok-token.json)"
            echo "TIKTOK_TOKEN updated."
          fi
